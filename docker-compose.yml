services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: logforge
      POSTGRES_PASSWORD: logforge
      POSTGRES_DB: logforge
    ports:
      - "5432:5432"

  clickhouse:
    image: clickhouse/clickhouse-server:24
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./backend/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      HOST: 0.0.0.0
      PORT: 4000
    depends_on:
      - postgres
      - clickhouse
      - redis
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api/v1
    environment:
      INTERNAL_API_BASE_URL: http://backend:4000/api/v1
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api/v1
    depends_on:
      - backend
    ports:
      - "3000:3000"
