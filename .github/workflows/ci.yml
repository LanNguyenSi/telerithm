name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://telerithm:telerithm@localhost:5432/telerithm
  CLICKHOUSE_URL: http://localhost:8123
  REDIS_URL: redis://localhost:6379

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: telerithm
          POSTGRES_PASSWORD: telerithm
          POSTGRES_DB: telerithm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      clickhouse:
        image: clickhouse/clickhouse-server:24
        ports:
          - 8123:8123

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: backend
        run: npx eslint src/

      - name: Format check
        working-directory: backend
        run: npx prettier --check src/

      - name: Unit & Integration tests with coverage
        working-directory: backend
        run: npm run test:coverage -- --coverage.reporter=json-summary --coverage.thresholds.lines=80 --coverage.thresholds.statements=80 --coverage.thresholds.functions=80 --coverage.thresholds.branches=70

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Tests with coverage
        working-directory: frontend
        run: npx vitest run --coverage --coverage.reporter=json-summary --coverage.thresholds.lines=70 --coverage.thresholds.statements=70

      - name: Build
        working-directory: frontend
        run: npm run build

  sdk-js:
    name: SDK JS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/sdk-js/package-lock.json

      - name: Install dependencies
        working-directory: packages/sdk-js
        run: npm ci

      - name: Type check
        working-directory: packages/sdk-js
        run: npx tsc --noEmit

      - name: Tests with coverage
        working-directory: packages/sdk-js
        run: npx vitest run --coverage --coverage.reporter=json-summary --coverage.thresholds.lines=94 --coverage.thresholds.statements=92 --coverage.thresholds.functions=92 --coverage.thresholds.branches=85

  cli:
    name: CLI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install bats
        run: npm install -g bats

      - name: Run bats tests
        run: bats packages/cli/logforge-pipe.bats
