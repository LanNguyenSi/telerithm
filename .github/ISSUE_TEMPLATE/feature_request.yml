name: Feature request
description: Propose a new capability or surface
labels: ["enhancement"]
body:
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - SDK
        - backend
        - frontend
        - ingest pipeline
        - ClickHouse / storage
        - local LLM integration
        - new surface
        - other / unsure
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
