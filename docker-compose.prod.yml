# Bounded container logs: without this the json-file driver grows unbounded
# (same class of problem as the ClickHouse system.text_log incident 2026-07-15).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: telerithm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telerithm}
      POSTGRES_DB: telerithm
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telerithm"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - chdata:/var/lib/clickhouse
      - ./backend/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./backend/clickhouse/limits.xml:/etc/clickhouse-server/config.d/limits.xml:ro
      - ./backend/clickhouse/system-logs.xml:/etc/clickhouse-server/config.d/system-logs.xml:ro
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    logging: *default-logging
    environment:
      HOST: 0.0.0.0
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgresql://telerithm:${POSTGRES_PASSWORD:-telerithm}@postgres:5432/telerithm?connection_limit=20&pool_timeout=10
      CLICKHOUSE_URL: http://clickhouse:8123
      REDIS_URL: redis://redis:6379
      REGISTRATION_MODE: ${REGISTRATION_MODE:-approval}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4000/api/v1/health').then(r => process.exit(r.ok ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_URL:-http://localhost:4000/api/v1}
    restart: unless-stopped
    logging: *default-logging
    environment:
      INTERNAL_API_BASE_URL: http://backend:4000/api/v1
      NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_URL:-http://localhost:4000/api/v1}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

volumes:
  pgdata:
  chdata:
  redisdata:
