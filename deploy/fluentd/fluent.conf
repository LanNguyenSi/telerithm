# Fluentd configuration for shipping logs to Telerithm
# Usage: Set env vars TELERITHM_URL, TELERITHM_SOURCE_ID, TELERITHM_API_KEY
#
# Docker log driver config (in docker-compose.yml):
#   logging:
#     driver: fluentd
#     options:
#       fluentd-address: localhost:24224
#       tag: "docker.{{.Name}}"

# --- Source: Accept logs from Docker log driver ---
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# --- Filter: Parse JSON logs ---
<filter docker.**>
  @type parser
  key_name log
  reserve_data true
  <parse>
    @type json
  </parse>
</filter>

# --- Match: Send to Telerithm ---
<match docker.**>
  @type http

  endpoint "#{ENV['TELERITHM_URL']}/api/v1/ingest/#{ENV['TELERITHM_SOURCE_ID']}"

  http_method post
  content_type application/json
  json_array true

  headers {"X-API-Key": "#{ENV['TELERITHM_API_KEY']}"}

  <format>
    @type json
  </format>

  # Buffer for reliability
  <buffer>
    @type file
    path /fluentd/log/buffer
    flush_interval 5s
    chunk_limit_size 1m
    total_limit_size 256m
    retry_max_times 5
    retry_wait 10s
    retry_exponential_backoff_base 2
  </buffer>
</match>
